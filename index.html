<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>IPTV HUB</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        h1 { font-size: 48px; margin-bottom: 50px; }
        
        /* This makes the buttons BIG and look like TV buttons */
        .btn { 
            display: inline-block; 
            width: 600px; 
            padding: 40px; 
            margin: 20px; 
            background: #222; 
            border: 5px solid #444; 
            color: white; 
            font-size: 36px; 
            text-decoration: none; 
            border-radius: 20px;
        }

        /* This is the "Selector" color for your remote */
        .btn:focus { 
            background: #0066ff; 
            border-color: #fff; 
            transform: scale(1.05);
            outline: none;
        }
    </style>
</head>
<body onload="init()">

    <h1>MY IPTV HUB</h1>
    <a href="#" class="btn" id="default-focus">LIVE SPORTS</a><br>
    <a href="#" class="btn">MOVIES & SERIES</a>

    <script src="https://cdn.jsdelivr.net/npm/spatial-navigation-js@0.5.0/dist/spatial_navigation.min.js"></script>
    <script>
        function init() {
            SpatialNavigation.init();
            SpatialNavigation.add({ selector: '.btn' });
            SpatialNavigation.makeFocusable();
            SpatialNavigation.focus('#default-focus');
        }

        // EXIT BUTTON FIX
        window.addEventListener('keydown', function(e) {
            if(e.keyCode == 10009) { // Samsung Return Key
                tizen.application.getCurrentApplication().exit();
            }
        });
    </script>
</body>
</html>
